name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev and dashboard extras
        run: python -m pip install -e ".[dev,dashboard]"

      - name: Verify packaged dashboard assets
        if: matrix.python-version == '3.12' && runner.os == 'Linux'
        run: python scripts/verify_dashboard_wheel.py

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy
        # The repo's mypy config targets python_version 3.12; running it once per OS on
        # the 3.12 interpreter avoids stub mismatches on the 3.11 floor-check job.
        if: matrix.python-version == '3.12'
        run: python -m mypy src

      - name: Pytest
        # Network-marked integration tests skip themselves unless
        # SOLARCLEAN_RUN_NETWORK_TESTS=1, so this runs fully offline.
        run: python -m pytest -q
