    process_energy_kwh_per_m2: 0.2
    fixed_equipment_setup_cost: 5000
    inspection_hours_per_year: 40
    maintenance_cost_per_year: 1200
    useful_life_years: 5
    reapplication_interval_years: null
    water_collection_infrastructure_cost: 0
