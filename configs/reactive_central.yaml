simulation:
  start: "2025-01-01T00:00:00+03:00"
  end: "2025-01-02T23:00:00+03:00"
  target_timezone: Asia/Riyadh
  run_id_prefix: reactive-central
site:
  name: Riyadh
  latitude: 24.7136
  longitude: 46.6753
  timezone: Asia/Riyadh
weather:
  provider: fixture
  cache_enabled: true
  cache_directory: data/cache/weather
  missing_data_policy: error
pv_system:
  panel_count: 10000
  panel_capacity_w: 400
  tilt_degrees: 25
  azimuth_degrees: 180
  inverter_efficiency: 0.96
  dc_ac_ratio: 1.15
farm:
  representation: cohort
  total_panels: 10000
  panel_capacity_w: 400
  cohort_count: 100
  panels_per_cohort: 100
  store_cohort_daily_details: true
  cohort_soiling_variation_fraction: 0.0
soiling:
  base_daily_soiling_loss_fraction: 0.0025
  seasonal_multipliers:
    1: 1.0
  dust_event_probability: 0.2
  dust_event_loss_min_fraction: 0.005
  dust_event_loss_max_fraction: 0.01
  minimum_soiling_ratio: 0.7
  stochastic_std_fraction: 0.0
  random_seed: 42
rainfall_cleaning:
  partial_rain_threshold_mm: 1.0
  full_rain_cleaning_threshold_mm: 5.0
  partial_rain_cleaning_efficiency: 0.45
  full_rain_cleaning_efficiency: 0.95
bird_droppings:
  event_probability_per_cohort_day: 0.02
  coverage_min_fraction: 0.001
  coverage_max_fraction: 0.004
  loss_per_coverage_fraction: 0.8
  rain_removal_efficiency: 0.3
reactive_cv:
  enabled: true
  perfect_information_benchmark: true
  inspection:
    interval_days: 7
    first_inspection_day_index: 0
    dirty_soiling_ratio_threshold: 0.92
  drone:
    cohorts_per_flight: 10
    flights_per_day: 4
    flight_duration_minutes: 18
    max_wind_speed_m_s: 12
    max_precipitation_mm: 0.2
    energy_kwh_per_flight: 0.35
    compute_energy_kwh_per_image: 0.01
  observer:
    recall_fraction: 0.85
    false_positive_rate: 0.05
    missed_image_fraction: 0.03
    base_confidence: 0.8
    confidence_std_fraction: 0.1
    severity_error_std_fraction: 0.15
  dispatch:
    estimated_loss_threshold_fraction: 0.05
    confidence_threshold: 0.5
    max_queue_age_days: 14
  crew:
    daily_capacity_cohorts: 6
    setup_minutes_per_cohort: 8
    cleaning_minutes_per_cohort: 25
    water_liters_per_cohort: 180
    dust_removal_efficiency: 0.92
    bird_removal_efficiency: 0.95
output:
  base_directory: outputs
  include_cohort_daily_details: true
logging:
  level: INFO
