  run_id_prefix: coating-strong
site:
  name: Riyadh
  latitude: 24.7136
  longitude: 46.6753
  timezone: Asia/Riyadh
weather:
  provider: fixture
  cache_enabled: true
  cache_directory: data/cache/weather
  missing_data_policy: error
pv_system:
