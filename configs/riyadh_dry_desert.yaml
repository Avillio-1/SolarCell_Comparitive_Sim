# Dry-desert reference site for the dry-vs-humid desert coating experiment.
# Identical to configs/dammam_humid_desert.yaml except site name/coordinates
# and run_id_prefix, so any outcome difference is attributable to the weather
# NASA POWER returns for the location (Riyadh: dry inland desert, rare dew).
# Humidity physics (dew cementation, coating condensation, smooth humidity
# cooling) are enabled in BOTH configs; the dry site simply rarely triggers
# them.
simulation:
  start: "2025-01-01T00:00:00+03:00"
  end: "2025-12-31T23:00:00+03:00"
  target_timezone: Asia/Riyadh
  run_id_prefix: dry-riyadh
site:
  name: Riyadh (dry desert)
  latitude: 24.7136
  longitude: 46.6753
  timezone: Asia/Riyadh
weather:
  provider: nasa_power
  cache_enabled: true
  cache_directory: data/cache/weather
  missing_data_policy: error
  timeout_seconds: 60
pv_system:
  panel_count: 10000
  panel_capacity_w: 400
  tilt_degrees: 25
  azimuth_degrees: 180
  inverter_efficiency: 0.96
  dc_ac_ratio: 1.15
farm:
  representation: cohort
  total_panels: 10000
  panel_capacity_w: 400
  cohort_count: 100
  panels_per_cohort: 100
  store_cohort_daily_details: true
  cohort_soiling_variation_fraction: 0.02
soiling:
  base_daily_soiling_loss_fraction: 0.001
  seasonal_multipliers:
    3: 1.1
    4: 1.15
    5: 1.1
  dust_event_probability: 0.03
  dust_event_loss_min_fraction: 0.005
  dust_event_loss_max_fraction: 0.03
  minimum_soiling_ratio: 0.55
  stochastic_std_fraction: 0.1
  random_seed: 42
  dew_cementation:
    enabled: true
    onset_relative_humidity_pct: 75.0
    saturation_relative_humidity_pct: 95.0
    max_soiling_rate_multiplier: 1.5
    max_rain_efficiency_penalty: 0.5
    memory_days: 10
rainfall_cleaning:
  partial_rain_threshold_mm: 1.0
  full_rain_cleaning_threshold_mm: 5.0
  partial_rain_cleaning_efficiency: 0.45
  full_rain_cleaning_efficiency: 0.95
bird_droppings:
  event_probability_per_cohort_day: 0.01
  coverage_min_fraction: 0.001
  coverage_max_fraction: 0.01
  loss_per_coverage_fraction: 0.8
  rain_removal_efficiency: 0.3
output:
  base_directory: outputs
  include_cohort_daily_details: true
logging:
  level: INFO
coating:
  enabled: true
  preset: kaust_paper_strong
  # Coating physics anchored to the KAUST paper (10.1002/eem2.70350) and the
  # project's T3 calibration audit (docs/audits/t3_t6_kaust_coating_correction.md):
  # +1.4% measured transmittance vs uncoated glass (Fig 2e), ~7 C max radiative
  # cooling with only a modest humidity penalty (8.0 C @50% RH -> 6.1 C @90% RH,
  # Fig 3a => floor 0.70), condensation onset near 65% RH (Fig 3c), dew yield
  # calibrated to 128 g/m2/night (Fig 5h), and self-cleaning that is dew-driven
  # (passive 0.11/day at full dew) rather than adhesion-multiplier-driven.
  physics:
    optical_transmittance_multiplier: 1.014
    source_optical_transmittance_absolute_fraction: null
    emissivity_atmospheric_window: 0.90
    contact_angle_degrees: 167
    sliding_angle_degrees: 3
    dust_accumulation_multiplier: 0.90
    initial_effectiveness_fraction: 1.0
    annual_degradation_fraction: 0.02
    max_surface_cooling_c: 7.0
    humidity_cooling_reference_pct: 80
    humidity_cooling_mode: smooth
    humidity_cooling_dry_reference_pct: 40
    humidity_cooling_floor_fraction: 0.70
    cementation_suppression_fraction: 0.9
    wind_cooling_decay_per_m_s: 0.08
    daytime_cooling_fraction: 0.0
    passive_cleaning_base_efficiency: 0.11
    passive_cleaning_tilt_reference_degrees: 25
    bird_removal_efficiency: 0.05
    max_bird_removal_fraction_per_day: 0.01
  water:
    # The coefficient is an effective harvested-yield calibration to
    # the paper's measured 0.128 L/m2 favorable night. Weather still gates dew.
    condensation_liters_per_m2_per_c_hour: 0.0046767
    minimum_relative_humidity_pct: 65
    collectable_water_efficiency_fraction: 1.0
    actual_collection_efficiency_fraction: 1.0
  deployment:
    mode: factory_preinstall
    area_per_panel_m2: 2.0
    useful_life_years: 3
    reapplication_supported: false
    reapplication_interval_years: null
    thermal_treatment_temperature_c: 400
    thermal_treatment_duration_minutes: 30
    field_application_demonstrated: false
  costs:
    material_loading_g_per_m2: 12.5
    material_cost_per_m2: 15.0
    surface_preparation_cost_per_m2: 2.0
    application_labor_hours_per_m2: 0.03
    process_energy_kwh_per_m2: 0.2
    fixed_equipment_setup_cost: 10000
    inspection_hours_per_year: 40
    maintenance_cost_per_year: 20000
    useful_life_years: 3
    reapplication_interval_years: null
    water_collection_infrastructure_cost: 0
    assumption_level: central
    source_status: provisional
reactive_cv:
  enabled: true
  perfect_information_benchmark: false
  inspection:
    interval_days: 15
    first_inspection_day_index: 0
    dirty_soiling_ratio_threshold: 0.92
  drone:
    cohorts_per_flight: 5
    flights_per_day: 2
    flight_duration_minutes: 18
    max_wind_speed_m_s: 12
    max_precipitation_mm: 0.2
    energy_kwh_per_flight: 0.35
    compute_energy_kwh_per_image: 0.01
  observer:
    recall_fraction: 0.80
    false_positive_rate: 0.08
    missed_image_fraction: 0.03
    base_confidence: 0.8
    confidence_std_fraction: 0.1
    severity_error_std_fraction: 0.15
  dispatch:
    estimated_loss_threshold_fraction: 0.04
    confidence_threshold: 0.5
    max_queue_age_days: 14
  crew:
    daily_capacity_cohorts: 6
    # Minutes are WORKER-minutes for a 2-person crew (elapsed time is half):
    # 100 panels per 25 elapsed minutes needs two workers at the registry's
    # central 120 panels/worker-hour, so labour is billed for both.
    setup_minutes_per_cohort: 16
    cleaning_minutes_per_cohort: 50
    water_liters_per_cohort: 150
    dust_removal_efficiency: 0.92
    bird_removal_efficiency: 0.95
calibration:
  assumption_set: riyadh_central_v2
  parameter_registry_path: data/calibration/parameter_registry.yaml
  source_note: "Dry-vs-humid desert experiment, dry arm: live NASA POWER weather for Riyadh; Riyadh central-v2 soiling/dust/cost calibration; coating physics anchored to KAUST paper 10.1002/eem2.70350 via the T3 kaust_paper_strong calibration audit (dew-driven passive cleaning, +1.4% optical, cooling humidity floor 0.70, condensation from 65% RH); dew cementation enabled identically in both arms."
