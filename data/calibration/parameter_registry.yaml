metadata:
  registry_name: solarclean_dt_t5_parameter_registry
  version: "2026-06-30-t5"
  target_site: Riyadh, Saudi Arabia
  retrieval_date: "2026-06-30"
  climate_context: Hot arid Gulf interior site using Asia/Riyadh daily aggregation.
  current_config_presets:
    low: configs/calibration/low.yaml
    central: configs/calibration/central.yaml
    high: configs/calibration/high.yaml
  scope_note: >
    Current production presets only include sections accepted by SolarCleanConfig.
    Future T2, T3, and T4 paths are registered here and documented as interface
    requests until their modules publish strict config models.
parameters:
  - name: soiling.base_daily_loss_fraction
    configuration_path: soiling.base_daily_soiling_loss_fraction
    category: soiling
    central_value: 0.0025
    low_value: 0.0012
    high_value: 0.004
    unit: fraction/day
    source: "SolarClean Phase 3.5 provisional presets; Kimber et al. 2006 PV soiling model; Ilse et al. 2019 Joule soiling-economics review, https://doi.org/10.1016/j.joule.2019.08.019"
    evidence_type: inferred
    source_geography_and_climate: "Southwestern United States and global arid PV evidence; Riyadh 2025 weather context."
    applicability_to_saudi_conditions: "Comparable dry, dusty operating context but not a measured Riyadh site soiling station."
    confidence: medium
    status: provisional
    rationale: "Keeps the current central model value and brackets lower and higher arid soiling conditions."
    limitations: "Needs measured clean/reference cell or measured production calibration at the target farm."
    responsible_module_or_owner: T1/core baseline
  - name: soiling.minimum_soiling_ratio
    configuration_path: soiling.minimum_soiling_ratio
    category: soiling
    central_value: 0.55
    low_value: 0.45
    high_value: 0.7
    unit: fraction
    source: "SolarClean Phase 3.5 stress-test bounds derived from baseline model sensitivity needs."
    evidence_type: assumed
    source_geography_and_climate: "Model guardrail rather than a directly measured climate result."
    applicability_to_saudi_conditions: "Useful for preventing physically impossible accumulation while stress-testing Saudi dry seasons."
    confidence: low
    status: provisional
    rationale: "Bounds the floor of the empirical soiling ratio under prolonged dry contamination."
    limitations: "Should be replaced by measured saturation behavior for local dust mineralogy and cleaning cadence."
    responsible_module_or_owner: T1/core baseline
  - name: soiling.stochastic_std_fraction
    configuration_path: soiling.stochastic_std_fraction
    category: soiling
    central_value: 0.1
    low_value: 0.05
    high_value: 0.15
    unit: fraction
    source: "SolarClean event-tape design and Phase 3.5 provisional Riyadh presets."
    evidence_type: assumed
    source_geography_and_climate: "No site measurement; uncertainty placeholder for arid daily dust variability."
    applicability_to_saudi_conditions: "Needed for Saudi sensitivity runs, but not yet fitted to Riyadh observations."
    confidence: low
    status: provisional
    rationale: "Controls daily random variation around the dry-weather soiling rate."
    limitations: "Requires local soiling station data or production residual analysis."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.march_multiplier
    configuration_path: soiling.seasonal_multipliers.3
    category: seasonality
    central_value: 1.1
    low_value: 1.0
    high_value: 1.2
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring dust season, hot arid climate."
    applicability_to_saudi_conditions: "Spring dust enhancement is plausible for Riyadh but site-year variability is high."
    confidence: medium
    status: provisional
    rationale: "Raises March dry accumulation during the regional dust season."
    limitations: "Does not distinguish synoptic dust storms, local construction dust, or farm microclimate."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.april_multiplier
    configuration_path: soiling.seasonal_multipliers.4
    category: seasonality
    central_value: 1.15
    low_value: 1.05
    high_value: 1.25
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring dust season, hot arid climate."
    applicability_to_saudi_conditions: "April often falls within regional dust-season conditions relevant to Riyadh."
    confidence: medium
    status: provisional
    rationale: "Uses the strongest seasonal central uplift in the current preset family."
    limitations: "Needs local measured dust deposition or aerosol optical depth regression."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.may_multiplier
    configuration_path: soiling.seasonal_multipliers.5
    category: seasonality
    central_value: 1.1
    low_value: 1.0
    high_value: 1.2
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring to early-summer dust season, hot arid climate."
    applicability_to_saudi_conditions: "Reasonable provisional uplift for Riyadh pending measured deposition."
    confidence: medium
    status: provisional
    rationale: "Extends the spring dust-season uplift into May."
    limitations: "Does not yet reflect year-specific dust-storm counts."
    responsible_module_or_owner: T1/core baseline
  - name: dust_events.daily_probability
    configuration_path: soiling.dust_event_probability
    category: dust_events
    central_value: 0.03
    low_value: 0.015
    high_value: 0.06
    unit: probability/day
    source: "SolarClean Phase 3.5 provisional event-tape presets; Saudi/Gulf dust-storm climatology evidence."
    evidence_type: inferred
    source_geography_and_climate: "Saudi and Gulf arid dust-event context."
    applicability_to_saudi_conditions: "Represents localized heavy soiling days, not official dust-storm warning frequency."
    confidence: low
    status: provisional
    rationale: "Generates a plausible stress-test range for event-tape comparability."
    limitations: "Must be calibrated against measured dust events or quality-controlled visibility/PM observations."
    responsible_module_or_owner: T1/core event tape
  - name: dust_events.loss_min_fraction
    configuration_path: soiling.dust_event_loss_min_fraction
    category: dust_events
    central_value: 0.005
    low_value: 0.003
    high_value: 0.01
    unit: fraction/event
    source: "SolarClean Phase 3.5 provisional event-tape presets; PV soiling literature envelopes."
    evidence_type: inferred
    source_geography_and_climate: "Arid PV soiling evidence, not a measured Riyadh event distribution."
    applicability_to_saudi_conditions: "A conservative lower event loss for Saudi sensitivity studies."
    confidence: low
    status: provisional
    rationale: "Defines the lower bound of the stochastic heavy-dust event loss range."
    limitations: "Needs event-specific before/after power or soiling-ratio measurements."
    responsible_module_or_owner: T1/core event tape
  - name: dust_events.loss_max_fraction
    configuration_path: soiling.dust_event_loss_max_fraction
    category: dust_events
    central_value: 0.03
    low_value: 0.015
    high_value: 0.05
    unit: fraction/event
    source: "SolarClean Phase 3.5 provisional event-tape presets; PV soiling literature envelopes."
    evidence_type: inferred
    source_geography_and_climate: "Arid PV soiling evidence, not a measured Riyadh event distribution."
    applicability_to_saudi_conditions: "Captures severe Saudi dust-event sensitivity without hard-coding an extreme."
    confidence: low
    status: provisional
    rationale: "Defines the upper bound of the stochastic heavy-dust event loss range."
    limitations: "Storm severity, dust chemistry, tilt, and cleaning history can make this nonstationary."
    responsible_module_or_owner: T1/core event tape
  - name: rainfall.partial_threshold_mm
    configuration_path: rainfall_cleaning.partial_rain_threshold_mm
    category: rainfall_cleaning
    central_value: 1.0
    low_value: 0.8
    high_value: 1.5
    unit: mm/day
    source: "SolarClean Phase 3.5 provisional rainfall presets; Kimber-style rainfall reset concept."
    evidence_type: inferred
    source_geography_and_climate: "PV soiling models from arid and semi-arid climates."
    applicability_to_saudi_conditions: "Riyadh rain is infrequent; partial cleaning threshold remains a sensitivity parameter."
    confidence: low
    status: provisional
    rationale: "Triggers partial natural cleaning from light rainfall."
    limitations: "Rain intensity, mud formation, and dust mineralogy may reverse or weaken cleaning."
    responsible_module_or_owner: T1/core baseline
  - name: rainfall.full_threshold_mm
    configuration_path: rainfall_cleaning.full_rain_cleaning_threshold_mm
    category: rainfall_cleaning
    central_value: 5.0
    low_value: 4.0
    high_value: 6.0
    unit: mm/day
    source: "SolarClean Phase 3.5 provisional rainfall presets; Kimber-style rainfall reset concept."
    evidence_type: inferred
    source_geography_and_climate: "PV soiling models from arid and semi-arid climates."
    applicability_to_saudi_conditions: "Useful first-order threshold for rare stronger Riyadh rainfall events."
    confidence: low
    status: provisional
    rationale: "Triggers strong natural cleaning in the empirical model."
    limitations: "Must be checked against measured soiling recovery after Riyadh rain events."
    responsible_module_or_owner: T1/core baseline
  - name: rainfall.partial_efficiency
    configuration_path: rainfall_cleaning.partial_rain_cleaning_efficiency
    category: rainfall_cleaning
    central_value: 0.45
    low_value: 0.35
    high_value: 0.55
    unit: fraction_of_soiling_gap
    source: "SolarClean Phase 3.5 provisional rainfall presets."
    evidence_type: assumed
    source_geography_and_climate: "Arid PV natural-cleaning placeholder."
    applicability_to_saudi_conditions: "Broad sensitivity bound for Saudi light-rain cleaning."
    confidence: low
    status: provisional
    rationale: "Restores part of the gap from current soiled state to clean state."
    limitations: "No local rain-wash validation; light rain can leave residue."
    responsible_module_or_owner: T1/core baseline
  - name: rainfall.full_efficiency
    configuration_path: rainfall_cleaning.full_rain_cleaning_efficiency
    category: rainfall_cleaning
    central_value: 0.95
    low_value: 0.9
    high_value: 0.98
    unit: fraction_of_soiling_gap
    source: "SolarClean Phase 3.5 provisional rainfall presets."
    evidence_type: assumed
    source_geography_and_climate: "Arid PV natural-cleaning placeholder."
    applicability_to_saudi_conditions: "Broad sensitivity bound for rare strong Saudi rain events."
    confidence: low
    status: provisional
    rationale: "Allows strong rainfall to nearly reset dust soiling without exceeding the clean state."
    limitations: "Rain chemistry and post-rain dust can reduce effectiveness."
    responsible_module_or_owner: T1/core baseline
