metadata:
  registry_name: solarclean_dt_t5_parameter_registry
  version: "2026-07-06-central-v2"
  target_site: Riyadh, Saudi Arabia
  retrieval_date: "2026-06-30"
  climate_context: Hot arid Gulf interior site using Asia/Riyadh daily aggregation.
  current_config_presets:
    default: configs/default.yaml
  corrected_assumption_set: riyadh_central_v2
  scope_note: >
    The sole runtime configuration is configs/default.yaml. Low and high registry
    values are consumed programmatically by sensitivity analysis rather than
    duplicated as YAML overlays.
parameters:
  - name: soiling.base_daily_loss_fraction
    configuration_path: soiling.base_daily_soiling_loss_fraction
    category: soiling
    central_value: 0.001
    low_value: 0.0005
    high_value: 0.0022
    unit: fraction/day
    source: "SolarClean Phase 3.5 provisional presets; Kimber et al. 2006 PV soiling model; Ilse et al. 2019 Joule soiling-economics review, https://doi.org/10.1016/j.joule.2019.08.019"
    evidence_type: inferred
    source_geography_and_climate: "Southwestern United States and global arid PV evidence; Riyadh 2025 weather context."
    applicability_to_saudi_conditions: "Comparable dry, dusty operating context but not a measured Riyadh site soiling station."
    confidence: medium
    status: provisional
    rationale: "Central-v2 tuning keeps sparse-rain event physics while targeting about 25% annual no-clean loss for the 2025 full-year fixture."
    limitations: "Needs measured clean/reference cell or measured production calibration at the target farm."
    responsible_module_or_owner: T1/core baseline
  - name: soiling.no_clean_annual_loss_target_fraction
    configuration_path: calibration.central_v2_targets.baseline_no_clean_annual_loss_fraction
    category: soiling
    central_value: 0.25
    low_value: 0.12
    high_value: 0.4
    unit: fraction/year
    source: "T6 parameter audit correction, 2026-07-06; target range selected for Riyadh central mitigation comparison."
    evidence_type: assumed
    source_geography_and_climate: "Riyadh hot-arid central planning target, not a measured soiling-station result."
    applicability_to_saudi_conditions: "Used to prevent the central case from becoming a severe no-clean stress test."
    confidence: low
    status: provisional
    rationale: "Documents the annual no-clean loss target used to tune runtime soiling parameters without hardcoding an output."
    limitations: "Must be replaced by measured soiling/reference-cell data before decision use."
    responsible_module_or_owner: T1/core baseline
  - name: soiling.minimum_soiling_ratio
    configuration_path: soiling.minimum_soiling_ratio
    category: soiling
    central_value: 0.55
    low_value: 0.45
    high_value: 0.7
    unit: fraction
    source: "SolarClean Phase 3.5 stress-test bounds derived from baseline model sensitivity needs."
    evidence_type: assumed
    source_geography_and_climate: "Model guardrail rather than a directly measured climate result."
    applicability_to_saudi_conditions: "Useful for preventing physically impossible accumulation while stress-testing Saudi dry seasons."
    confidence: low
    status: provisional
    rationale: "Bounds the floor of the empirical soiling ratio under prolonged dry contamination."
    limitations: "Should be replaced by measured saturation behavior for local dust mineralogy and cleaning cadence."
    responsible_module_or_owner: T1/core baseline
  - name: soiling.stochastic_std_fraction
    configuration_path: soiling.stochastic_std_fraction
    category: soiling
    central_value: 0.1
    low_value: 0.05
    high_value: 0.15
    unit: fraction
    source: "SolarClean event-tape design and Phase 3.5 provisional Riyadh presets."
    evidence_type: assumed
    source_geography_and_climate: "No site measurement; uncertainty placeholder for arid daily dust variability."
    applicability_to_saudi_conditions: "Needed for Saudi sensitivity runs, but not yet fitted to Riyadh observations."
    confidence: low
    status: provisional
    rationale: "Controls daily random variation around the dry-weather soiling rate."
    limitations: "Requires local soiling station data or production residual analysis."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.march_multiplier
    configuration_path: soiling.seasonal_multipliers.3
    category: seasonality
    central_value: 1.1
    low_value: 1.0
    high_value: 1.2
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring dust season, hot arid climate."
    applicability_to_saudi_conditions: "Spring dust enhancement is plausible for Riyadh but site-year variability is high."
    confidence: medium
    status: provisional
    rationale: "Raises March dry accumulation during the regional dust season."
    limitations: "Does not distinguish synoptic dust storms, local construction dust, or farm microclimate."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.april_multiplier
    configuration_path: soiling.seasonal_multipliers.4
    category: seasonality
    central_value: 1.15
    low_value: 1.05
    high_value: 1.25
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring dust season, hot arid climate."
    applicability_to_saudi_conditions: "April often falls within regional dust-season conditions relevant to Riyadh."
    confidence: medium
    status: provisional
    rationale: "Uses the strongest seasonal central uplift in the current preset family."
    limitations: "Needs local measured dust deposition or aerosol optical depth regression."
    responsible_module_or_owner: T1/core baseline
  - name: seasonality.may_multiplier
    configuration_path: soiling.seasonal_multipliers.5
    category: seasonality
    central_value: 1.1
    low_value: 1.0
    high_value: 1.2
    unit: multiplier
    source: "Saudi and Gulf dust climatology evidence summarized in source bibliography; SolarClean Phase 3.5 preset."
    evidence_type: inferred
    source_geography_and_climate: "Saudi/Gulf spring to early-summer dust season, hot arid climate."
    applicability_to_saudi_conditions: "Reasonable provisional uplift for Riyadh pending measured deposition."
    confidence: medium
    status: provisional
    rationale: "Extends the spring dust-season uplift into May."
    limitations: "Does not yet reflect year-specific dust-storm counts."
    responsible_module_or_owner: T1/core baseline
