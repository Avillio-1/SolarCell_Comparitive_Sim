<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SolarClean-DT{% endblock %}</title>
<script>
  // Apply the persisted theme before the stylesheet paints to avoid a flash.
  // Stored in localStorage so the choice survives refresh and new tabs.
  (function () {
    try {
      var theme = localStorage.getItem("solarclean-theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      }
    } catch (e) { /* storage unavailable: Daylight remains the default */ }
  })();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23f3b43f'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%2317232b' stroke-width='2.5'/%3E%3Cpath d='M16 3v4M16 25v4M3 16h4M25 16h4' stroke='%2317232b' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/dashboard.css?v=20260716a">
</head>
<body class="{% block body_class %}{% endblock %}">
<a class="skip-link" href="#main-content">Skip to content</a>
<header class="topbar">
  <a class="brand" href="/" aria-label="SolarClean-DT home">
    <span class="brand-mark" aria-hidden="true"><span class="brand-sun"></span></span>
    <span><strong>SolarClean-DT</strong><small>PV strategy simulator</small></span>
  </a>
  <nav>
    <a {% if request.url.path == "/" %}class="nav-current" aria-current="page" {% endif %}href="/">Runs &amp; analysis</a>
    <button id="audit-toggle" type="button" class="audit-toggle" aria-pressed="false"
            title="Reveal the artifact source behind displayed figures">
      <span class="audit-dot" aria-hidden="true"></span><span>Audit mode</span>
    </button>
    <button id="theme-toggle" type="button" class="theme-toggle"
            aria-label="Switch between Daylight and Night shift">
      <span class="sun-dial" aria-hidden="true"><span></span></span>
      <span class="theme-label">Daylight</span>
    </button>
  </nav>
</header>
<main id="main-content">
{% block content %}{% endblock %}
</main>
<footer>
  Results are read directly from <code>outputs/&lt;run_id&gt;/</code>. The dashboard performs no
  scientific or financial simulation. <button type="button" class="footer-audit-toggle">A displayed
  number always has a file it came from — turn on audit mode.</button>
</footer>
<aside id="audit-popover" class="audit-popover" role="dialog" aria-modal="false"
       aria-labelledby="audit-popover-title" hidden>
  <button type="button" class="audit-close" aria-label="Close audit source">×</button>
  <span class="audit-kicker">SOURCE TRACE / مسار المصدر</span>
  <strong id="audit-popover-title">Stored artifact</strong>
  <p id="audit-popover-detail"></p>
  <p id="audit-popover-check" class="audit-check"></p>
</aside>
<script src="/static/dashboard.js?v=20260716a"></script>
{% block scripts %}{% endblock %}
</body>
</html>
