<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SolarClean-DT{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23f3b43f'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%2317232b'/%3E%3Cg stroke='%2317232b' stroke-width='9' stroke-linecap='round'%3E%3Cpath d='M50 15v11M50 74v11M15 50h11M74 50h11M26 26l7.5 7.5M66.5 66.5l7.5 7.5M74 26l-7.5 7.5M33.5 66.5L26 74'/%3E%3C/g%3E%3C/svg%3E">
<script>
  // Apply the persisted theme before the stylesheet paints to avoid a flash.
  // Stored in localStorage so the choice survives refresh and new tabs.
  (function () {
    try {
      var theme = localStorage.getItem("solarclean-theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.dataset.theme = "dark";
      }
    } catch (e) { /* storage unavailable: default to light */ }
  })();
</script>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/" aria-label="SolarClean-DT home">
    <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 16 16" width="16" height="16" fill="none"><circle cx="8" cy="8" r="2.6" fill="currentColor"/><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M8 1.6v2.1M8 12.3v2.1M1.6 8h2.1M12.3 8h2.1M3.5 3.5l1.5 1.5M11 11l1.5 1.5M12.5 3.5L11 5M5 11l-1.5 1.5"/></svg></span>
    <span><strong>SolarClean-DT</strong><small>PV strategy simulator</small></span>
  </a>
  <nav>
    <a class="nav-current" href="/">Runs &amp; analysis</a>
    <button id="theme-toggle" type="button" class="theme-toggle"
            aria-label="Switch between light and dark mode">theme</button>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  Results are read directly from <code>outputs/&lt;run_id&gt;/</code>. The dashboard performs no
  scientific or financial calculation; a displayed number always has a file it came from.
</footer>
<script src="/static/dashboard.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
