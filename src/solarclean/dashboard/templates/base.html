<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SolarClean-DT{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☀️%3C/text%3E%3C/svg%3E">
<script>
  // Apply the persisted theme before the stylesheet paints to avoid a flash.
  // Stored in localStorage so the choice survives refresh and new tabs.
  (function () {
    try {
      var theme = localStorage.getItem("solarclean-theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.dataset.theme = "dark";
      }
    } catch (e) { /* storage unavailable: default to light */ }
  })();
</script>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/" aria-label="SolarClean-DT home">
    <span class="brand-mark" aria-hidden="true">SC</span>
    <span><strong>SolarClean-DT</strong><small>PV strategy simulator</small></span>
  </a>
  <nav>
    <a class="nav-current" href="/">Runs &amp; analysis</a>
    <button id="theme-toggle" type="button" class="theme-toggle"
            aria-label="Switch between light and dark mode">theme</button>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  Results are read directly from <code>outputs/&lt;run_id&gt;/</code>. The dashboard performs no
  scientific or financial calculation; a displayed number always has a file it came from.
</footer>
<script src="/static/dashboard.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
